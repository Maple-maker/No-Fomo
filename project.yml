name: NoFomo
options:
  bundleIdPrefix: com.nofomodev
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: 1
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  NoFomo:
    type: application
    platform: iOS
    sources:
      - path: NoFomo/NoFomoApp.swift
      - path: NoFomo/Models
      - path: NoFomo/Components
      - path: NoFomo/Services
      - path: NoFomo/ViewModels
      - path: NoFomo/Views
      - path: NoFomo/Assets.xcassets
    entitlements:
      path: NoFomo/NoFomo.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        aps-environment: development
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown"
        GENERATE_INFOPLIST_FILE: YES
        ENABLE_PREVIEWS: YES
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 1
        PRODUCT_BUNDLE_IDENTIFIER: com.nofomodev.app
        DEVELOPMENT_TEAM: XYALA22765
        CODE_SIGN_STYLE: Automatic
    preBuildScripts:
      - name: "SwiftLint"
        script: |
          if which swiftlint > /dev/null; then
            swiftlint
          fi
        basedOnDependencyAnalysis: false
        inputFiles: []
        outputFiles: []
